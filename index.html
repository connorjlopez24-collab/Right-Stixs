<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
      text-align: left;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .hidden { display: none; }

    .section {
      margin-top: 10px;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .buy {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-weight: bold;
      text-decoration: none;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>RIGHT STIXS FIT</h1>
  <div class="sub">Find your perfect golf clubs in under 30 seconds</div>

  <!-- QUIZ -->
  <div id="quiz" class="card">
    <div class="tag">QUESTION</div>
    <div class="question" id="question"></div>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">

    <div class="tag">YOUR FULL GOLF BAG</div>

    <!-- DRIVER -->
    <div class="section">
      <div class="title">Driver</div>
      <div class="desc" id="driverText"></div>
      <a id="driverLink" class="buy" target="_blank">Shop Driver</a>
    </div>

    <!-- IRONS -->
    <div class="section">
      <div class="title">Irons</div>
      <div class="desc" id="ironText"></div>
      <a id="ironLink" class="buy" target="_blank">Shop Irons</a>
    </div>

    <!-- WEDGES -->
    <div class="section">
      <div class="title">Wedges</div>
      <div class="desc" id="wedgeText"></div>
      <a id="wedgeLink" class="buy" target="_blank">Shop Wedges</a>
    </div>

    <!-- PUTTER -->
    <div class="section">
      <div class="title">Putter</div>
      <div class="desc" id="putterText"></div>
      <a id="putterLink" class="buy" target="_blank">Shop Putter</a>
    </div>

    <button onclick="restart()">Start Over</button>

  </div>

</div>

<script>

const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Advanced"]
  },
  {
    q: "What matters most?",
    a: ["Distance", "Accuracy", "Consistency"]
  },
  {
    q: "How fast is your swing?",
    a: ["Slow", "Average", "Fast"]
  }
];

let step = 0;
let answers = [];

function loadQuestion() {

  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(answer) {

  answers.push(answer);
  step++;

  if (step < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let driver = "";
  let irons = "";
  let wedges = "";
  let putter = "";

  let driverLink = "";
  let ironLink = "";
  let wedgeLink = "";
  let putterLink = "";

  // BEGINNER
  if (answers.includes("Beginner")) {

    driver = "Callaway Big Bertha Driver (easy launch)";
    irons = "TaylorMade Stealth Irons (forgiveness)";
    wedges = "Cleveland CBX Wedges (easy control)";
    putter = "Odyssey Mallet Putter (very forgiving)";

    driverLink = "https://www.amazon.com/s?k=callaway+driver&tag=YOURID";
    ironLink = "https://www.amazon.com/s?k=taylormade+irons&tag=YOURID";
    wedgeLink = "https://www.amazon.com/s?k=cleveland+wedges&tag=YOURID";
    putterLink = "https://www.amazon.com/s?k=odyssey+putter&tag=YOURID";
  }

  // FAST / ADVANCED
  else if (answers.includes("Fast")) {

    driver = "TaylorMade Stealth 2 Driver (low spin)";
    irons = "Titleist T100 Irons (precision)";
    wedges = "Titleist Vokey Wedges (tour control)";
    putter = "Scotty Cameron Blade (feel + control)";

    driverLink = "https://www.amazon.com/s?k=taylormade+driver&tag=YOURID";
    ironLink = "https://www.amazon.com/s?k=titleist+irons&tag=YOURID";
    wedgeLink = "https://www.amazon.com/s?k=vokey+wedges&tag=YOURID";
    putterLink = "https://www.amazon.com/s?k=scotty+cameron+putter&tag=YOURID";
  }

  // BALANCED
  else {

    driver = "Callaway Rogue Driver (balanced distance)";
    irons = "TaylorMade SIM Irons (distance + control)";
    wedges = "Cleveland RTX Wedges";
    putter = "Odyssey Stroke Lab Putter";

    driverLink = "https://www.amazon.com/s?k=callaway+rogue+driver&tag=YOURID";
    ironLink = "https://www.amazon.com/s?k=taylormade+sim+irons&tag=YOURID";
    wedgeLink = "https://www.amazon.com/s?k=cleveland+rtx+wedges&tag=YOURID";
    putterLink = "https://www.amazon.com/s?k=odyssey+stroke+lab+putter&tag=YOURID";
  }

  document.getElementById("driverText").innerText = driver;
  document.getElementById("ironText").innerText = irons;
  document.getElementById("wedgeText").innerText = wedges;
  document.getElementById("putterText").innerText = putter;

  document.getElementById("driverLink").href = driverLink;
  document.getElementById("ironLink").href = ironLink;
  document.getElementById("wedgeLink").href = wedgeLink;
  document.getElementById("putterLink").href = putterLink;
}

function restart() {
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
