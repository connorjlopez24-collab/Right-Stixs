<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs | Golf Fitting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #070707;
      color: white;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .brand {
      letter-spacing: 4px;
      font-size: 14px;
      color: #aaa;
    }

    h1 {
      font-size: 34px;
      margin: 10px 0;
    }

    .sub {
      color: #888;
      font-size: 14px;
      max-width: 420px;
      margin: auto;
    }

    /* CONTAINER */
    .container {
      max-width: 520px;
      margin: auto;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 18px;
      margin-top: 15px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
    }

    input[type=range] {
      width: 100%;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    /* RESULT */
    .resultTitle {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tile {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      padding: 10px;
    }

    .value {
      font-size: 16px;
      margin-top: 5px;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
      margin-top: 10px;
    }

    .sectionTitle {
      font-size: 12px;
      letter-spacing: 2px;
      color: #888;
      margin-top: 15px;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="brand">RIGHT STIXS</div>
  <h1>Premium Golf Fitting</h1>
  <div class="sub">
    A modern fitting system that matches your swing to the right clubs.
    Built for clarity, not confusion.
  </div>
</div>

<div class="container">

  <!-- INPUT -->
  <div id="home" class="card">
    <div class="label">SWING SPEED (mph)</div>
    <input id="speed" type="range" min="70" max="120" value="95">
    <div style="margin-top:8px;">Speed: <span id="val">95</span> mph</div>

    <button onclick="run()">Get My Fit</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">

    <div class="card">
      <div class="resultTitle" id="profile"></div>
      <div class="desc">Your personalized fitting profile based on swing data.</div>

      <div class="sectionTitle">PERFORMANCE SNAPSHOT</div>

      <div class="grid">
        <div class="tile">
          <div class="label">EST. DISTANCE</div>
          <div class="value" id="distance"></div>
        </div>

        <div class="tile">
          <div class="label">SHAFT TYPE</div>
          <div class="value" id="shaft"></div>
        </div>
      </div>

      <div class="sectionTitle">RECOMMENDED SETUP</div>
      <div class="desc" id="clubs"></div>

    </div>

    <button onclick="restart()">Try Again</button>

  </div>

</div>

<script>

const s = document.getElementById("speed");
const v = document.getElementById("val");

s.oninput = () => v.innerText = s.value;

function run() {

  document.getElementById("home").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let speed = parseInt(s.value);

  let distance = Math.round((speed * speed) / 45);

  let profile = "";
  let shaft = "";
  let clubs = "";

  if (speed < 85) {
    profile = "Beginner-Friendly Fit";
    shaft = "Light / Senior Flex";
    clubs = "Forgiving driver, high-launch irons, maximum ease of use.";
  }

  else if (speed < 100) {
    profile = "Balanced Player Fit";
    shaft = "Regular Flex";
    clubs = "Distance irons, mid-launch driver, balanced control and power.";
  }

  else {
    profile = "Performance Player Fit";
    shaft = "Stiff / X-Stiff";
    clubs = "Low-spin driver, players irons, built for control and shot shaping.";
  }

  document.getElementById("profile").innerText = profile;
  document.getElementById("distance").innerText = distance + " yards";
  document.getElementById("shaft").innerText = shaft;
  document.getElementById("clubs").innerText = clubs;
}

function restart() {
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

</script>

</body>
</html>
