<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .result-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .desc {
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <h1>RIGHT STIXS</h1>
    <p>Smart golf fitting system built for clarity.</p>
    <button onclick="startQuiz()">Start Fitting</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden card">
    <div class="tag">PLAYER FIT ASSESSMENT</div>
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden card">
    <div class="tag" id="resultTag"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="desc" id="resultDesc"></div>
    <button onclick="restart()">Start Over</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Regular", "Serious"]
  },
  {
    q: "What is your main goal?",
    a: ["Distance", "Accuracy", "Consistency", "All-around"]
  },
  {
    q: "How would you describe your swing?",
    a: ["Smooth", "Average", "Powerful"]
  }
];

let step = 0;
let answers = [];

function startQuiz() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.a.forEach(function(opt) {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = function() {
      selectAnswer(opt);
    };
    optionsDiv.appendChild(btn);
  });
}

function selectAnswer(answer) {
  answers.push(answer);
  step++;

  if (step < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

/* ---------------- SMART FIT ENGINE ---------------- */

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let skill = answers[0];
  let goal = answers[1];
  let swing = answers[2];

  let forgiveness = 0;
  let control = 0;
  let distance = 0;

  // Skill weighting
  if (skill === "Beginner") forgiveness += 3;
  if (skill === "Casual") forgiveness += 2;
  if (skill === "Regular") control += 1;
  if (skill === "Serious") control += 3;

  // Goal weighting
  if (goal === "Distance") distance += 3;
  if (goal === "Accuracy") control += 3;
  if (goal === "Consistency") forgiveness += 2;
  if (goal === "All-around") {
    forgiveness += 1;
    control += 1;
    distance += 1;
  }

  // Swing weighting
  if (swing === "Smooth") forgiveness += 2;
  if (swing === "Average") control += 1;
  if (swing === "Powerful") distance += 2;

  let tag = "";
  let title = "";
  let desc = "";

  if (forgiveness >= control && forgiveness >= distance) {
    tag = "FORGIVENESS PROFILE";
    title = "Game Improvement Setup";
    desc = `
      Built for consistency and easy launch.<br><br>
      <b>Recommended Specs:</b><br>
      • Driver: 10.5°–12°<br>
      • Irons: Cavity back<br>
      • Shaft: Regular / Senior flex<br><br>
      Helps reduce mishits and improve contact.
    `;
  }

  else if (control >= forgiveness && control >= distance) {
    tag = "BALANCED PROFILE";
    title = "Player Improvement Setup";
    desc = `
      Balanced mix of control and forgiveness.<br><br>
      <b>Recommended Specs:</b><br>
      • Driver: 9.5°–10.5°<br>
      • Irons: Game improvement irons<br>
      • Shaft: Regular / Stiff flex<br><br>
      Helps improve consistency and shot control.
    `;
  }

  else {
    tag = "DISTANCE PROFILE";
    title = "Power Performance Setup";
    desc = `
      Built for speed and distance.<br><br>
      <b>Recommended Specs:</b><br>
      • Driver: 8°–10°<br>
      • Irons: Players irons<br>
      • Shaft: Stiff / Extra stiff<br><br>
      Maximizes ball speed and distance output.
    `;
  }

  document.getElementById("resultTag").innerText = tag;
  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultDesc").innerHTML = desc;
}

function restart() {
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
