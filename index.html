<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      background: #0b0b0b;
      color: white;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 70px 20px 30px;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 3px;
      color: #aaa;
    }

    h1 {
      font-size: 36px;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    .sub {
      color: #999;
      font-size: 14px;
      max-width: 420px;
      margin: auto;
      line-height: 1.5;
    }

    .cta {
      margin-top: 20px;
    }

    button {
      width: 90%;
      max-width: 320px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    /* INPUT SECTION */
    .container {
      max-width: 520px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 14px;
      padding: 18px;
      margin-top: 20px;
      text-align: center;
    }

    .label {
      font-size: 11px;
      color: #777;
      letter-spacing: 2px;
    }

    input[type=range] {
      width: 100%;
      margin-top: 10px;
    }

    .speedVal {
      margin-top: 8px;
      color: #ddd;
    }

    /* RESULT */
    .hidden { display: none; }

    .fitTitle {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .fitDesc {
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
    }

    .box {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      text-align: left;
    }

    .smallLabel {
      font-size: 10px;
      color: #777;
      letter-spacing: 2px;
    }

    .value {
      font-size: 16px;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="brand">RIGHT STIXS</div>
  <h1>Find Your Perfect Clubs</h1>
  <div class="sub">
    A simple fitting system that matches your swing to the right golf setup.
  </div>

  <div class="cta">
    <button onclick="start()">Get Fitted</button>
  </div>
</div>

<!-- INPUT -->
<div class="container">

  <div id="input" class="card hidden">

    <div class="label">SWING SPEED</div>

    <input id="speed" type="range" min="70" max="120" value="95">
    <div class="speedVal">Speed: <span id="val">95</span> mph</div>

    <button onclick="run()" style="margin-top:15px;">See My Fit</button>

  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">

    <div class="card">

      <div class="fitTitle" id="profile"></div>
      <div class="fitDesc">
        This is your recommended golf setup based on swing speed.
      </div>

      <div class="box">
        <div class="smallLabel">ESTIMATED DISTANCE</div>
        <div class="value" id="distance"></div>
      </div>

      <div class="box">
        <div class="smallLabel">SHAFT TYPE</div>
        <div class="value" id="shaft"></div>
      </div>

      <div class="box">
        <div class="smallLabel">BEST CLUB TYPE</div>
        <div class="value" id="clubs"></div>
      </div>

    </div>

    <button onclick="restart()">Try Again</button>

  </div>

</div>

<script>

const s = document.getElementById("speed");
const v = document.getElementById("val");

function start() {
  document.getElementById("input").classList.remove("hidden");
}

s.oninput = () => v.innerText = s.value;

function run() {

  document.getElementById("input").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let speed = parseInt(s.value);
  let distance = Math.round((speed * speed) / 45);

  let profile = "";
  let shaft = "";
  let clubs = "";

  if (speed < 85) {
    profile = "Beginner Friendly Fit";
    shaft = "Light / Senior Flex";
    clubs = "Forgiving driver + easy irons for confidence";
  }

  else if (speed < 100) {
    profile = "Balanced Player Fit";
    shaft = "Regular Flex";
    clubs = "Distance irons + balanced driver setup";
  }

  else {
    profile = "Performance Player Fit";
    shaft = "Stiff / X-Stiff";
    clubs = "Low spin driver + control-focused irons";
  }

  document.getElementById("profile").innerText = profile;
  document.getElementById("distance").innerText = distance + " yards";
  document.getElementById("shaft").innerText = shaft;
  document.getElementById("clubs").innerText = clubs;
}

function restart() {
  document.getElementById("result").classList.add("hidden");
  document.getElementById("input").classList.remove("hidden");
}

</script>

</body>
</html>
