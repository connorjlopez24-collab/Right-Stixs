<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <h1>RIGHT STIXS</h1>
    <p>Precision fitting for golfers who want clarity.</p>
    <button onclick="startQuiz()">Start Fitting</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden card">
    <div class="tag">PLAYER FIT ASSESSMENT</div>
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden card">
    <div class="tag" id="resultTag"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultDesc"></p>
    <button onclick="restart()">Start Over</button>
  </div>

</div>

<script>
const questions = [
  { q: "What is your experience level?", a: ["Beginner","Casual","Regular","Serious"] },
  { q: "What matters most in your game?", a: ["Distance","Accuracy","Consistency","All-around"] },
  { q: "How would you describe your swing?", a: ["Smooth","Average","Powerful"] },
  { q: "What is your height?", a: ["Under 5ft5","5ft5-5ft10","5ft10-6ft2","6ft2+"] }
];

let step = 0;
let answers = [];

function startQuiz(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let container = document.getElementById("options");
  container.innerHTML = "";

  q.a.forEach(function(opt){
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = function(){
      select(opt);
    };
    container.appendChild(btn);
  });
}

function select(answer){
  answers.push(answer);
  step++;

  if(step < questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let tag = "BALANCED PERFORMANCE PROFILE";
  let title = "Edge Fit Recommendation";
  let desc = "A refined balance of distance, control, and consistency.";

  if(answers.includes("Beginner")){
    tag = "FORGIVENESS PROFILE";
    title = "Core Fit Recommendation";
    desc = "Designed for maximum forgiveness and ease of play.";
  }

  if(answers.includes("Serious")){
    tag = "PRECISION PERFORMANCE PROFILE";
    title = "Elite Fit Recommendation";
    desc = "Built for control and advanced performance.";
  }

  document.getElementById("resultTag").innerText = tag;
  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultDesc").innerText = desc;
}

function restart(){
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
