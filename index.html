<script>
const questions = [
  { q: "What is your experience level?", a: ["Beginner","Casual","Regular","Serious"] },
  { q: "What matters most in your game?", a: ["Distance","Accuracy","Consistency","All-around"] },
  { q: "How would you describe your swing?", a: ["Smooth","Average","Powerful"] },
  { q: "What is your height?", a: ["Under 5'5","5'5 - 5'10","5'10 - 6'2","6'2+"] }
];

let step = 0;
let answers = [];

function startQuiz(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let container = document.getElementById("options");
  container.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = function() {
      select(opt);
    };
    container.appendChild(btn);
  });
}

function select(answer){
  answers.push(answer);
  step++;

  if(step < questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let tag = "BALANCED PERFORMANCE PROFILE";
  let title = "Edge Fit Recommendation";
  let desc = "A refined balance of distance, control, and consistency.";

  if(answers.includes("Beginner")){
    tag = "FORGIVENESS PROFILE";
    title = "Core Fit Recommendation";
    desc = "Designed for maximum forgiveness and ease of play.";
  }

  if(answers.includes("Serious")){
    tag = "PRECISION PERFORMANCE PROFILE";
    title = "Elite Fit Recommendation";
    desc = "Built for control, feedback, and advanced shot shaping.";
  }

  document.getElementById("resultTag").innerText = tag;
  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultDesc").innerText = desc;
}

function restart(){
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>
