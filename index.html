<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
      text-align: left;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .buy {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      margin-top: 8px;
    }

    .section {
      margin-top: 10px;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .bundleTitle {
      font-size: 16px;
      margin-top: 10px;
      color: #fff;
    }

    .hidden { display: none; }

  </style>
</head>

<body>

<div class="container">

  <h1>RIGHT STIXS FIT</h1>
  <div class="sub">Build your perfect golf setup</div>

  <!-- QUIZ -->
  <div id="quiz" class="card">
    <div class="tag">QUESTION</div>
    <div class="question" id="question"></div>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">

    <div class="tag">YOUR RECOMMENDED SETUP</div>

    <div class="bundleTitle" id="bundleType"></div>

    <!-- FULL SET OPTIONS -->
    <div class="section">
      <div class="title">Full Set Options</div>

      <div class="desc">Choose a complete setup based on your level:</div>

      <a id="starterKit" class="buy" target="_blank">Beginner Starter Kit</a>
      <a id="valueSet" class="buy" target="_blank">Best Value Full Set</a>
      <a id="premiumSet" class="buy" target="_blank">Premium Full Set</a>
    </div>

    <!-- INDIVIDUAL CLUBS -->
    <div class="section">
      <div class="title">Individual Clubs</div>

      <div class="desc" id="driverText"></div>
      <a id="driverLink" class="buy" target="_blank">Shop Driver</a>

      <div class="desc" id="ironText"></div>
      <a id="ironLink" class="buy" target="_blank">Shop Irons</a>

      <div class="desc" id="wedgeText"></div>
      <a id="wedgeLink" class="buy" target="_blank">Shop Wedges</a>

      <div class="desc" id="putterText"></div>
      <a id="putterLink" class="buy" target="_blank">Shop Putter</a>
    </div>

    <button onclick="restart()">Start Over</button>

  </div>

</div>

<script>

const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Advanced"]
  },
  {
    q: "What matters most?",
    a: ["Distance", "Accuracy", "Consistency"]
  },
  {
    q: "How fast is your swing?",
    a: ["Slow", "Average", "Fast"]
  }
];

let step = 0;
let answers = [];

function loadQuestion() {
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(answer) {
  answers.push(answer);
  step++;

  if (step < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let driver = "";
  let irons = "";
  let wedges = "";
  let putter = "";
  let bundle = "";

  let starter = "";
  let value = "";
  let premium = "";

  let driverLink = "";
  let ironLink = "";
  let wedgeLink = "";
  let putterLink = "";

  // LEVEL LOGIC
  if (answers.includes("Beginner")) {

    bundle = "Beginner Starter Kit (Easy & Forgiving)";

    driver = "High-loft driver for easy launch";
    irons = "Super forgiving irons for straighter shots";
    wedges = "Easy bounce wedges for contact";
    putter = "Mallet putter for stability";

    starter = "https://www.amazon.com/s?k=beginner+golf+set&tag=YOURID";
    value = "https://www.amazon.com/s?k=callaway+complete+golf+set&tag=YOURID";
    premium = "https://www.amazon.com/s?k=premium+golf+clubs+set&tag=YOURID";
  }

  else if (answers.includes("Fast")) {

    bundle = "Premium Performance Setup (Control & Speed)";

    driver = "Low-spin driver for control";
    irons = "Players irons for precision";
    wedges = "Tour wedges for shot shaping";
    putter = "Blade putter for feel";

    starter = "https://www.amazon.com/s?k=beginner+golf+set&tag=YOURID";
    value = "https://www.amazon.com/s?k=titleist+golf+set&tag=YOURID";
    premium = "https://www.amazon.com/s?k=taylormade+premium+golf+set&tag=YOURID";
  }

  else {

    bundle = "Balanced Full Set (Best Value Choice)";

    driver = "Balanced driver for distance + control";
    irons = "Forgiving but powerful irons";
    wedges = "Standard wedges for all conditions";
    putter = "Stable putter for consistency";

    starter = "https://www.amazon.com/s?k=beginner+golf+set&tag=YOURID";
    value = "https://www.amazon.com/s?k=best+value+golf+set&tag=YOURID";
    premium = "https://www.amazon.com/s?k=titleist+complete+set&tag=YOURID";
  }

  // TEXT
  document.getElementById("bundleType").innerText = bundle;

  document.getElementById("driverText").innerText = driver;
  document.getElementById("ironText").innerText = irons;
  document.getElementById("wedgeText").innerText = wedges;
  document.getElementById("putterText").innerText = putter;

  // LINKS
  document.getElementById("starterKit").href = starter;
  document.getElementById("valueSet").href = value;
  document.getElementById("premiumSet").href = premium;

  document.getElementById("driverLink").href = "https://www.amazon.com/s?k=driver+golf&tag=YOURID";
  document.getElementById("ironLink").href = "https://www.amazon.com/s?k=iron+golf+set&tag=YOURID";
  document.getElementById("wedgeLink").href = "https://www.amazon.com/s?k=golf+wedges&tag=YOURID";
  document.getElementById("putterLink").href = "https://www.amazon.com/s?k=golf+putter&tag=YOURID";
}

function restart() {
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
