<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .tag {
      font-size: 12px;
      color: #777;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <h1>RIGHT STIXS</h1>
    <p>Find the golf setup that fits your game.</p>
    <button onclick="startQuiz()">Start Fitting</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden card">
    <div class="tag">FIT ASSESSMENT</div>
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden card">
    <div class="tag" id="resultTag"></div>
    <h2 id="resultTitle"></h2>
    <div id="resultDesc"></div>
    <button onclick="restart()">Start Over</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Regular", "Serious"]
  },
  {
    q: "What matters most?",
    a: ["Distance", "Accuracy", "Consistency", "All-around"]
  },
  {
    q: "Your swing type?",
    a: ["Smooth", "Average", "Powerful"]
  }
];

let step = 0;
let answers = [];

function startQuiz() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.a.forEach(function(option) {
    let btn = document.createElement("button");
    btn.innerText = option;
    btn.onclick = function() {
      selectAnswer(option);
    };
    optionsDiv.appendChild(btn);
  });
}

function selectAnswer(answer) {
  answers.push(answer);
  step++;

  if (step < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let skill = answers[0];

  let tag = "";
  let title = "";
  let desc = "";

  if (skill === "Beginner") {
    tag = "FORGIVENESS PROFILE";
    title = "Game Improvement Setup";
    desc = `
      Easy-to-hit setup built for confidence.<br><br>
      • Driver: 10.5°–12°<br>
      • Irons: Cavity back<br>
      • Shaft: Regular/Senior<br><br>
      Helps reduce mishits and improve consistency.
    `;
  } else if (skill === "Casual" || skill === "Regular") {
    tag = "BALANCED PROFILE";
    title = "Player Improvement Setup";
    desc = `
      Balanced setup for growing players.<br><br>
      • Driver: 9.5°–10.5°<br>
      • Irons: Game improvement<br>
      • Shaft: Regular/Stiff<br><br>
      Mix of forgiveness and control.
    `;
  } else {
    tag = "PRECISION PROFILE";
    title = "Advanced Player Setup";
    desc = `
      Built for control and performance.<br><br>
      • Driver: 8°–10°<br>
      • Irons: Players irons<br>
      • Shaft: Stiff/Extra stiff<br><br>
      Maximum control and feedback.
    `;
  }

  document.getElementById("resultTag").innerText = tag;
  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultDesc").innerHTML = desc;
}

function restart() {
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
