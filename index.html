<!DOCTYPE html>
<html>
<head>
  <title>TrackFit Final Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050505;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 620px;
      margin: auto;
      padding: 20px 15px;
    }

    h1 {
      letter-spacing: 3px;
      font-size: 22px;
    }

    p { color: #888; font-size: 13px; }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      border-radius: 8px;
    }

    .card {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      text-align: left;
    }

    .hidden { display: none; }

    .label {
      font-size: 10px;
      color: #777;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .tile {
      background: #111;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1a1a1a;
    }

    .value {
      font-size: 15px;
      margin-top: 4px;
    }

    /* SHOT TRACER */
    .range {
      position: relative;
      height: 150px;
      background: #0a0a0a;
      border-radius: 10px;
      border: 1px solid #222;
      overflow: hidden;
      margin-top: 10px;
    }

    .ball {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      position: absolute;
      bottom: 10px;
      left: 20px;
      animation: fly 1.6s ease-out forwards;
    }

    @keyframes fly {
      0% { transform: translate(0,0); }
      50% { transform: translate(140px,-90px); }
      100% { transform: translate(280px,0); }
    }

    .target {
      position: absolute;
      right: 20px;
      bottom: 10px;
      width: 10px;
      height: 10px;
      border: 2px solid #4ade80;
      border-radius: 50%;
    }

    .report {
      font-size: 13px;
      color: #bbb;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">

    <h1>TRACKFIT FINAL</h1>
    <p>Launch monitor simulation engine</p>

    <div class="card">
      <div class="label">SWING SPEED</div>
      <input id="speed" type="range" min="70" max="120" value="95">
      <p>Speed: <span id="val">95</span> mph</p>
    </div>

    <button onclick="run()">Run Full Simulation</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">

    <div class="card">
      <div class="label">LAUNCH DATA</div>

      <div class="grid">
        <div class="tile">
          <div class="label">CARRY</div>
          <div class="value" id="carry"></div>
        </div>

        <div class="tile">
          <div class="label">BALL SPEED</div>
          <div class="value" id="ball"></div>
        </div>

        <div class="tile">
          <div class="label">SPIN</div>
          <div class="value" id="spin"></div>
        </div>

        <div class="tile">
          <div class="label">LAUNCH</div>
          <div class="value" id="launch"></div>
        </div>
      </div>

      <div class="range">
        <div class="ball"></div>
        <div class="target"></div>
      </div>
    </div>

    <div class="card">
      <div class="label">CLUB FIT REPORT</div>
      <div class="report" id="clubs"></div>
    </div>

    <div class="card">
      <div class="label">FITTER NOTES</div>
      <div class="report" id="notes"></div>
    </div>

    <button onclick="restart()">Run Again</button>

  </div>

</div>

<script>

const s = document.getElementById("speed");
const v = document.getElementById("val");

s.oninput = () => v.innerText = s.value;

function run() {

  document.getElementById("home").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let speed = parseInt(s.value);

  /* CORE PHYSICS MODEL */
  let ballSpeed = Math.round(speed * 1.45);
  let carry = Math.round((speed * speed) / 42);
  let spin = Math.max(1800, 3400 - speed * 13);
  let launch = Math.round(11 + (100 - speed) / 10);

  /* IMPACT QUALITY */
  let strike = "Pure Strike";
  if (speed < 85) strike = "Slight Contact Loss";
  if (speed > 110) strike = "Elite Compression";

  /* CLUB FIT LOGIC */
  let driver = "";
  let irons = "";
  let shaft = "";

  if (speed < 85) {
    driver = "High Loft Driver (11°–12°)";
    irons = "Game Improvement Irons";
    shaft = "Senior / Lightweight";
  } else if (speed < 100) {
    driver = "Mid Loft Driver (9.5°–10.5°)";
    irons = "Players Distance Irons";
    shaft = "Regular Flex";
  } else {
    driver = "Low Spin Driver (8°–9.5°)";
    irons = "Players / Tour Irons";
    shaft = "Stiff / X-Stiff";
  }

  document.getElementById("ball").innerText = ballSpeed + " mph";
  document.getElementById("carry").innerText = carry + " yds";
  document.getElementById("spin").innerText = spin + " rpm";
  document.getElementById("launch").innerText = launch + "°";

  document.getElementById("clubs").innerHTML =
    `<b>Driver:</b> ${driver}<br><br>
     <b>Irons:</b> ${irons}<br><br>
     <b>Shaft:</b> ${shaft}`;

  document.getElementById("notes").innerHTML =
    `Strike Quality: ${strike}<br>
     Efficiency model based on swing speed + compression estimate<br>
     Fitting confidence: High`;

}

function restart() {
  document.getElementById("result").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

</script>

</body>
</html>
