<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <h1>RIGHT STIXS</h1>
    <p>Precision fitting for golfers who want clarity.</p>
    <button onclick="startQuiz()">Start Fitting</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden card">
    <div class="tag">PLAYER FIT ASSESSMENT</div>
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden card">
    <div class="tag" id="resultTag"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultDesc"></p>
    <button onclick="restart()">Start Over</button>
  </div>

</div>

<script>
const questions = [
  { q: "What is your experience level?", a: ["Beginner","Casual","Regular","Serious"] },
  { q: "What matters most in your game?", a: ["Distance","Accuracy","Consistency","All-around"] },
  { q: "How would you describe your swing?", a: ["Smooth","Average","Powerful"] },
  { q: "What is your height?", a: ["Under 5ft5","5ft5-5ft10","5ft10-6ft2","6ft2+"] }
];

let step = 0;
let answers = [];

function startQuiz(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let skill = answers[0];
  let goal = answers[1];
  let swing = answers[2];

  let tag = "";
  let title = "";
  let desc = "";
  let setup = "";

  if(skill === "Beginner"){
    tag = "FORGIVENESS PROFILE";
    title = "Game Improvement Setup";
    desc = "Designed to help you hit the ball easier and more consistently.";

    setup = `
      <b>Recommended Setup:</b><br><br>
      • Driver: 10.5°–12° loft<br>
      • Irons: Cavity back (larger sweet spot)<br>
      • Shaft: Regular or Senior flex<br>
      • Clubs: Lightweight, forgiving design<br><br>
      <i>Why this works:</i> Maximizes forgiveness and helps reduce mishits.
    `;
  }

  else if(skill === "Casual" || skill === "Regular"){
    tag = "BALANCED PERFORMANCE PROFILE";
    title = "Player Improvement Setup";
    desc = "A mix of control and forgiveness to improve your consistency.";

    setup = `
      <b>Recommended Setup:</b><br><br>
      • Driver: 9.5°–10.5° loft<br>
      • Irons: Game improvement / players distance<br>
      • Shaft: Regular or Stiff flex<br>
      • Clubs: Balanced forgiveness + control<br><br>
      <i>Why this works:</i> Gives you better control while still helping on off-center hits.
    `;
  }

  else {
    tag = "PRECISION PERFORMANCE PROFILE";
    title = "Advanced Player Setup";
    desc = "Built for control, feedback, and shot shaping.";

    setup = `
      <b>Recommended Setup:</b><br><br>
      • Driver: 8°–10° loft (lower spin)<br>
      • Irons: Players irons (compact heads)<br>
      • Shaft: Stiff or Extra stiff<br>
      • Clubs: Precision-focused design<br><br>
      <i>Why this works:</i> Gives maximum control and feedback for skilled players.
    `;
  }

  document.getElementById("resultTag").innerText = tag;
  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultDesc").innerHTML = desc + "<br><br>" + setup;
}
