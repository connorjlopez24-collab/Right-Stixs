<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
      text-align: left;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .buy {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      margin-top: 8px;
    }

    .section {
      margin-top: 10px;
      padding: 12px;
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
    }

    .title {
      font-size: 16px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .bundleTitle {
      font-size: 16px;
      margin-top: 10px;
      color: #fff;
      font-weight: bold;
    }

    .hidden { display: none; }

  </style>
</head>

<body>

<div class="container">

  <h1>RIGHT STIXS FIT</h1>
  <div class="sub">Your personal golf club fitting engine</div>

  <!-- QUIZ -->
  <div id="quiz" class="card">
    <div class="tag">QUESTION</div>
    <div class="question" id="question"></div>
    <div id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">

    <div class="tag">YOUR FIT REPORT</div>

    <div class="bundleTitle" id="bundleType"></div>

    <!-- FULL SETS -->
    <div class="section">
      <div class="title">Full Set Options</div>

      <a id="starterKit" class="buy" target="_blank">Beginner Starter Kit</a>
      <a id="valueSet" class="buy" target="_blank">Best Value Full Set</a>
      <a id="premiumSet" class="buy" target="_blank">Premium Full Set</a>
    </div>

    <!-- DRIVER -->
    <div class="section">
      <div class="title">Driver</div>
      <div class="desc" id="driverText"></div>
      <a id="driverLink" class="buy" target="_blank">Shop Driver</a>
    </div>

    <!-- IRONS -->
    <div class="section">
      <div class="title">Irons</div>
      <div class="desc" id="ironText"></div>
      <a id="ironLink" class="buy" target="_blank">Shop Irons</a>
    </div>

    <!-- WEDGES -->
    <div class="section">
      <div class="title">Wedges</div>
      <div class="desc" id="wedgeText"></div>
      <a id="wedgeLink" class="buy" target="_blank">Shop Wedges</a>
    </div>

    <!-- PUTTER -->
    <div class="section">
      <div class="title">Putter</div>
      <div class="desc" id="putterText"></div>
      <a id="putterLink" class="buy" target="_blank">Shop Putter</a>
    </div>

    <button onclick="restart()">Start Over</button>

  </div>

</div>

<script>

const questions = [
  { q: "What is your experience level?", a: ["Beginner", "Casual", "Advanced"] },
  { q: "What matters most?", a: ["Distance", "Accuracy", "Consistency"] },
  { q: "How fast is your swing?", a: ["Slow", "Average", "Fast"] }
];

let step = 0;
let answers = [];

function loadQuestion() {
  let q = questions[step];
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(answer) {
  answers.push(answer);
  step++;

  if (step < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let bundle = "";
  let starter = "";
  let value = "";
  let premium = "";

  let driver = "";
  let irons = "";
  let wedges = "";
  let putter = "";

  // BEGINNER
  if (answers.includes("Beginner")) {

    bundle = "Beginner Starter Kit";

    driver = "Callaway Big Bertha Driver";
    irons = "TaylorMade SIM Max Irons";
    wedges = "Cleveland CBX Wedges";
    putter = "Odyssey White Hot Mallet Putter";

    starter = "https://www.amazon.com/s?k=beginner+golf+set";
    value = "https://www.amazon.com/s?k=callaway+complete+golf+set";
    premium = "https://www.amazon.com/s?k=premium+golf+set";
  }

  // FAST / ADVANCED
  else if (answers.includes("Fast")) {

    bundle = "Premium Performance Setup";

    driver = "TaylorMade Stealth 2 Driver";
    irons = "Titleist T100 Iron Set";
    wedges = "Titleist Vokey SM9 Wedges";
    putter = "Scotty Cameron Blade Putter";

    starter = "https://www.amazon.com/s?k=beginner+golf+set";
    value = "https://www.amazon.com/s?k=titleist+golf+set";
    premium = "https://www.amazon.com/s?k=taylormade+premium+set";
  }

  // BALANCED
  else {

    bundle = "Best Value Full Set";

    driver = "Callaway Rogue Driver";
    irons = "TaylorMade SIM2 Irons";
    wedges = "Cleveland RTX Wedges";
    putter = "Odyssey Stroke Lab Putter";

    starter = "https://www.amazon.com/s?k=beginner+golf+set";
    value = "https://www.amazon.com/s?k=best+value+golf+set";
    premium = "https://www.amazon.com/s?k=titleist+complete+set";
  }

  document.getElementById("bundleType").innerText = bundle;

  document.getElementById("driverText").innerText = driver;
  document.getElementById("ironText").innerText = irons;
  document.getElementById("wedgeText").innerText = wedges;
  document.getElementById("putterText").innerText = putter;

  document.getElementById("starterKit").href = starter;
  document.getElementById("valueSet").href = value;
  document.getElementById("premiumSet").href = premium;
}

function restart() {
  step = 0;
  answers = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
