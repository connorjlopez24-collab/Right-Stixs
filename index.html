<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
      text-align: left;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .hidden { display: none; }

    .section {
      margin-top: 10px;
      padding: 10px;
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }

    .buy {
      margin-top: 8px;
      background: #fff;
      color: #000;
      border-radius: 8px;
      padding: 10px;
      font-weight: bold;
      text-decoration: none;
      display: block;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>RIGHT STIXS FIT</h1>
  <div class="sub">Full bag fitting in under 30 seconds</div>

  <!-- QUIZ -->
  <div id="quiz" class="card">

    <div class="tag">QUESTION</div>
    <div class="question" id="question"></div>
    <div id="options"></div>

  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">

    <div class="tag">YOUR CUSTOM GOLF BAG</div>

    <!-- DRIVER -->
    <div class="section">
      <div class="title">Driver</div>
      <div class="desc" id="driverText"></div>
      <a href="#" class="buy">View Recommended Drivers</a>
    </div>

    <!-- IRONS -->
    <div class="section">
      <div class="title">Irons</div>
      <div class="desc" id="ironText"></div>
      <a href="#" class="buy">View Recommended Irons</a>
    </div>

    <!-- WEDGES -->
    <div class="section">
      <div class="title">Wedges</div>
      <div class="desc" id="wedgeText"></div>
      <a href="#" class="buy">View Recommended Wedges</a>
    </div>

    <!-- PUTTER -->
    <div class="section">
      <div class="title">Putter</div>
      <div class="desc" id="putterText"></div>
      <a href="#" class="buy">View Recommended Putters</a>
    </div>

  </div>

</div>

<script>

const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Advanced"]
  },
  {
    q: "What matters most?",
    a: ["Distance", "Accuracy", "Consistency"]
  },
  {
    q: "How fast is your swing?",
    a: ["Slow", "Average", "Fast"]
  }
];

let step = 0;
let answers = [];

function loadQuestion() {

  let q = questions[step];

  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(answer) {

  answers.push(answer);
  step++;

  if (step < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  // DRIVER
  let driver = "Balanced 10.5° driver for easy launch";
  let irons = "Forgiving irons for consistency";
  let wedges = "Standard wedges for control around greens";
  let putter = "Standard mallet putter for stability";

  if (answers.includes("Beginner")) {
    driver = "High-loft driver (11°–12°) for easier launch";
    irons = "Super forgiving irons for straighter shots";
    wedges = "Easy bounce wedges for better contact";
    putter = "High-MOI mallet putter for stability and forgiveness";
  }

  if (answers.includes("Fast")) {
    driver = "Low-spin driver (9°) for control and distance";
    irons = "Players irons for precision";
    wedges = "Tour wedges for shot shaping";
    putter = "Blade putter for better feel and control";
  }

  if (answers.includes("Accuracy")) {
    irons = "Accuracy-focused irons for tighter shot dispersion";
    putter = "Face-balanced mallet putter for straight strokes";
  }

  document.getElementById("driverText").innerText = driver;
  document.getElementById("ironText").innerText = irons;
  document.getElementById("wedgeText").innerText = wedges;
  document.getElementById("putterText").innerText = putter;
}

loadQuestion();

</script>

</body>
</html>
