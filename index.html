<!DOCTYPE html>
<html>
<head>
  <title>Right Stixs Fitting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 25px 15px;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .card {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
    }

    .question {
      font-size: 18px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .hidden { display: none; }

    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: #777;
      margin-bottom: 10px;
    }

    .resultTitle {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .resultText {
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>RIGHT STIXS FIT</h1>
  <div class="sub">Answer a few simple questions to find your best golf clubs.</div>

  <!-- QUIZ -->
  <div id="quiz" class="card">

    <div class="tag">STEP <span id="stepNum">1</span> / 3</div>

    <div class="question" id="question"></div>

    <div id="options"></div>

  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">

    <div class="tag">YOUR FIT</div>
    <div class="resultTitle" id="title"></div>
    <div class="resultText" id="desc"></div>

  </div>

</div>

<script>

const questions = [
  {
    q: "What is your experience level?",
    a: ["Beginner", "Casual", "Advanced"]
  },
  {
    q: "What matters most in your game?",
    a: ["Distance", "Accuracy", "Consistency"]
  },
  {
    q: "How fast is your swing?",
    a: ["Slow", "Average", "Fast"]
  }
];

let step = 0;
let answers = [];

function loadQuestion() {

  document.getElementById("stepNum").innerText = step + 1;

  let q = questions[step];

  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.a.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => select(opt);
    box.appendChild(btn);
  });
}

function select(answer) {

  answers.push(answer);
  step++;

  if (step < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let title = "Balanced Golf Fit";
  let desc = "A good mix of forgiveness, distance, and control.";

  if (answers.includes("Beginner")) {
    title = "Forgiving Beginner Fit";
    desc = "Easy-to-hit clubs designed to help you get consistent contact and build confidence.";
  }

  if (answers.includes("Fast")) {
    title = "Performance Player Fit";
    desc = "Lower spin, more control, and equipment built for higher swing speeds.";
  }

  if (answers.includes("Accuracy")) {
    title = "Control-Focused Fit";
    desc = "Clubs designed to tighten your shot pattern and improve accuracy.";
  }

  document.getElementById("title").innerText = title;
  document.getElementById("desc").innerText = desc;
}

loadQuestion();

</script>

</body>
</html>
